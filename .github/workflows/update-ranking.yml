name: Auto GitHub Crawler

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Crawl, Translate and Update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > crawler.js
          const fs = require('fs');

          // 대기 함수 (API 차단 방지용)
          const delay = ms => new Promise(res => setTimeout(res, ms));

          async function translateToKorean(text) {
            if (!text || text === '설명 없음' || text.trim() === '') return '설명 없음';
            try {
              const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
              const res = await fetch(url);
              if (!res.ok) return text; // 실패하면 원문 반환
              const json = await res.json();
              return json[0].map(item => item[0]).join('').trim();
            } catch (e) {
              return text;
            }
          }

          async function fetchRepos() {
            // 검색어 최적화: AI 코딩 전용 툴만 정밀 타격
            const query = encodeURIComponent('claude code OR cursorrules OR vibe coding OR aider OR cline');
            const url = `https://api.github.com/search/repositories?q=${query}+in:name,description+fork:false+stars:>10&sort=stars&order=desc&per_page=30`;
            
            const response = await fetch(url, {
              headers: {
                'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'Vibe-Coding-Radar'
              }
            });
            
            if (!response.ok) {
              console.error('API 호출 실패:', response.status);
              process.exit(1);
            }
            
            const data = await response.json();
            const formattedData = [];

            console.log(`총 ${data.items.length}개의 리스트를 발견했습니다. 번역을 시작합니다...`);

            for (let i = 0; i < data.items.length; i++) {
              const repo = data.items[i];
              const rawDescription = repo.description || '설명 없음';
              
              // 0.5초씩 쉬면서 번역 (구글 차단 회피)
              const koDescription = await translateToKorean(rawDescription);
              await delay(500); 
              
              let category = 'AI Tool';
              const repoName = repo.name.toLowerCase();
              if (repoName.includes('cursor')) category = 'Cursor';
              else if (repoName.includes('claude')) category = 'Claude';
              else if (repoName.includes('cline') || repoName.includes('roo')) category = 'Agent';
              else if (repoName.includes('aider')) category = 'Aider';

              formattedData.push({
                id: repo.name,
                rank: i + 1,
                title: repo.name,
                full_name: repo.full_name,
                category: category,
                use_case: repo.topics && repo.topics.length > 0 ? repo.topics.slice(0, 3).join(', ') : 'AI 코딩 도구',
                author: repo.owner.login,
                likes: repo.stargazers_count,
                summary: koDescription,
                link: repo.html_url,
                is_hall_of_fame: repo.stargazers_count >= 5000
              });
            }

            fs.writeFileSync('data.json', JSON.stringify(formattedData, null, 2));
            console.log('성공적으로 data.json 파일이 갱신되었습니다.');
          }
          
          fetchRepos().catch(err => {
            console.error('스크립트 에러:', err);
            process.exit(1);
          });
          EOF
          
          node crawler.js

      - name: Commit and Push (Force Update)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 강제로 변경 사항을 만들기 위해 업데이트 시간 텍스트 파일 생성
          echo "마지막 업데이트: $(date +'%Y-%m-%d %H:%M:%S')" > update_log.txt
          
          git add data.json update_log.txt
          git commit -m "auto: AI 툴 크롤링 및 번역 업데이트" || echo "변경 사항 없음"
          git push
