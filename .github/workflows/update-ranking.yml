name: Auto GitHub Crawler

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  crawl-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Crawl AI Coding Repos and Translate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > crawler.js
          async function translateToKorean(text) {
            if (!text || text === '설명 없음') return '설명 없음';
            try {
              const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
              const res = await fetch(url);
              if (!res.ok) return text;
              const json = await res.json();
              return json[0].map(item => item[0]).join('').trim();
            } catch (e) {
              return text;
            }
          }

          async function fetchRepos() {
            // API 에러 방지를 위해 쿼리를 간결하게 최적화 (명칭과 설명만 타격)
            const keywords = '("claude code" OR "cursor rules" OR "vibe coding" OR "aider" OR "cline agent")';
            const query = encodeURIComponent(`${keywords} in:name,description fork:false stars:>50`);
            const url = `https://api.github.com/search/repositories?q=${query}&sort=stars&order=desc&per_page=30`;
            
            console.log('요청 URL:', decodeURIComponent(url));

            const response = await fetch(url, {
              headers: {
                'Authorization': `Bearer ${process.env.GH_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'User-Agent': 'Vibe-Coding-Radar'
              }
            });
            
            // 여기서 실패하면 명확한 이유를 터미널에 출력하고 종료
            if (!response.ok) {
              const errorText = await response.text();
              console.error('API 에러 상세 코드:', response.status);
              console.error('API 에러 내용:', errorText);
              process.exit(1);
            }
            
            const data = await response.json();
            const formattedData = [];

            for (let i = 0; i < data.items.length; i++) {
              const repo = data.items[i];
              const rawDescription = repo.description || '설명 없음';
              const koDescription = await translateToKorean(rawDescription);
              
              let category = 'AI Tool';
              const repoName = repo.name.toLowerCase();
              if (repoName.includes('cursor')) category = 'Cursor';
              else if (repoName.includes('claude')) category = 'Claude';
              else if (repoName.includes('cline') || repoName.includes('roo')) category = 'Agent';
              else if (repoName.includes('aider')) category = 'Aider';

              formattedData.push({
                id: repo.name,
                rank: i + 1,
                title: repo.name,
                full_name: repo.full_name,
                category: category,
                use_case: repo.topics && repo.topics.length > 0 ? repo.topics.slice(0, 3).join(', ') : 'AI 코딩 도구',
                author: repo.owner.login,
                likes: repo.stargazers_count,
                summary: koDescription,
                link: repo.html_url,
                is_hall_of_fame: repo.stargazers_count >= 5000
              });
            }

            const fs = require('fs');
            fs.writeFileSync('data.json', JSON.stringify(formattedData, null, 2));
            console.log(`크롤링 및 번역 완료: ${formattedData.length}개 항목 저장됨`);
          }
          
          fetchRepos().catch(err => {
            console.error('예기치 않은 시스템 에러:', err);
            process.exit(1);
